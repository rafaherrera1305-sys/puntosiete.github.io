<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo del Almacén</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Catálogo del Almacén</h1>
        <div id="cartArea" class="hidden">
            <span id="cartIndicator">🛒 Total: $0</span>
            <button id="checkoutBtn">Obtener descuento</button>
        </div>
        <button id="adminLoginBtn">Acceso Administrador</button>
        <button id="logoutBtn" class="hidden">Cerrar Sesión</button>
    </header>


    <main>
        <div id="productList" class="product-list"></div>
    </main>

    <!-- Modal login -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span id="closeModal">&times;</span>
            <h2>Acceso Administrador</h2>
            <input type="password" id="adminPassword" placeholder="Contraseña">
            <button id="loginBtn">Ingresar</button>
        </div>
    </div>

    <!-- Panel administración -->
    <div id="adminPanel" class="admin-panel hidden">
        <h2>Cargar Producto</h2>
        <input type="text" id="productName" placeholder="Nombre del producto">
        <input type="number" id="productPrice" placeholder="Precio">
        <input type="file" id="productImage" accept="image/*">
        <button id="addProductBtn">Agregar Producto</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
